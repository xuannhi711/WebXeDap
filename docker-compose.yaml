version: '3'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-CU24-ubuntu-20.04
    ports:
      - "${MSSQL_PORT:-1433}:1433"
    environment:
      - ACCEPT_EULA=Y
      - MSSQL_SA_PASSWORD=${MSSQL_SA_PASSWORD:?error}
    volumes:
      - mssql_data:/var/opt/mssql

  mailpit:
    image: docker.io/axllent/mailpit:v1.30
    environment:
      - MP_DATABASE=/data/mailpit.db
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    volumes:
      - mailpit_data:/data

volumes:
  mssql_data:
  mailpit_data:
